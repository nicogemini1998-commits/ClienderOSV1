# LeadUp Nginx Server Configuration
# Proxy all /api/* requests to FastAPI backend on port 8002
# Serve frontend SPA from ./dist

server {
    listen 80;
    server_name leadup.cliender.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name leadup.cliender.com;

    ssl_certificate     /etc/letsencrypt/live/leadup.cliender.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/leadup.cliender.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # API proxy — forward to backend FastAPI server
    # Note: proxy_pass WITHOUT trailing slash preserves /api in the path
    location /api/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Frontend SPA — serve from dist directory with fallback to index.html
    location / {
        root  /var/www/leadup/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
