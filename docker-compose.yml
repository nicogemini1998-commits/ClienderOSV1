services:
  postgres:
    image: postgres:17-alpine
    container_name: studio-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - studio_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studio-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: studio-redis
    ports:
      - "127.0.0.1:6380:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - studio-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  studio:
    image: node:24-alpine
    container_name: studio
    depends_on:
      leadup:
        condition: service_started
    ports:
      - "127.0.0.1:5174:5174"
    environment:
      VITE_PORT: "5174"
      VITE_API_URL: http://leadup:8002
      NODE_ENV: development
    volumes:
      - ./apps/studio/frontend:/app
      - /app/node_modules
    networks:
      - studio-net
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  leadup:
    image: python:3.11-slim
    container_name: leadup
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      DATABASE_URL: ${SUPABASE_DB_URL:?SUPABASE_DB_URL required}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-}
      NODE_ENV: development
    volumes:
      - ./apps/leadup:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - studio-net
    working_dir: /app/backend
    command: sh -c "pip install -r /app/requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8002 --reload"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  studio_postgres_data:
  studio_redis_data:

networks:
  studio-net:
    driver: bridge
