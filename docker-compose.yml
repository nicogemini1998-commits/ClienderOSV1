services:
  postgres:
    image: postgres:16-alpine
    container_name: cliender-db
    environment:
      POSTGRES_USER: cliender
      POSTGRES_PASSWORD: cliender_secure_password_change_me
      POSTGRES_DB: cliender_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliender"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cliender-network
    restart: unless-stopped

  studio:
    container_name: cliender-studio
    build:
      context: .
      dockerfile: Dockerfile.studio
    environment:
      NODE_ENV: development
      PORT: 3005
      FRONTEND_URL: http://localhost:3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cliender_db
      DB_USER: cliender
      DB_PASSWORD: cliender_secure_password_change_me
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cliender-network
    restart: unless-stopped

  leadup:
    container_name: cliender-leadup
    build:
      context: .
      dockerfile: Dockerfile.leadup
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 8002
      FRONTEND_URL: http://localhost:8002
      ENVIRONMENT: development
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-api03-placeholder}
      JWT_SECRET: ${JWT_SECRET:-leadup_secret_jwt_2024_change_this}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-placeholder}
    ports:
      - "8002:8002"
    volumes:
      - leadup_data:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cliender-network
    restart: unless-stopped

  adminer:
    image: adminer
    container_name: cliender-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - cliender-network
    restart: unless-stopped
    environment:
      ADMINER_PLUGINS: tables-filter tinymce

networks:
  cliender-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  leadup_data:
    driver: local
