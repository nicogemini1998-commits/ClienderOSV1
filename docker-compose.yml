version: '3.9'

services:
  # PostgreSQL Database - shared by both apps
  postgres:
    image: postgres:16-alpine
    container_name: cliender-db
    environment:
      POSTGRES_USER: cliender
      POSTGRES_PASSWORD: cliender_secure_password_change_me
      POSTGRES_DB: cliender_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliender"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cliender-network
    restart: unless-stopped

  # Studio App - Node.js backend + React frontend
  studio:
    container_name: cliender-studio
    build:
      context: .
      dockerfile: Dockerfile.studio
    environment:
      NODE_ENV: development
      PORT: 3005
      FRONTEND_URL: http://localhost:3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cliender_db
      DB_USER: cliender
      DB_PASSWORD: cliender_secure_password_change_me
    ports:
      - "3005:3005"
    volumes:
      - ./apps/studio/backend:/app:cached
      - ./apps/studio/frontend:/app/frontend:cached
      - /app/node_modules
      - /app/frontend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cliender-network
    restart: unless-stopped
    # For development - auto-reload
    command: npm run dev

  # LeadUp App - Python FastAPI backend + React frontend
  leadup:
    container_name: cliender-leadup
    build:
      context: .
      dockerfile: Dockerfile.leadup
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 8002
      FRONTEND_URL: http://localhost:8002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cliender_db
      DB_USER: cliender
      DB_PASSWORD: cliender_secure_password_change_me
      ENVIRONMENT: development
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-sk-ant-api03-placeholder}
      JWT_SECRET: ${JWT_SECRET:-leadup_secret_jwt_2024_change_this}
      APOLLO_API_KEY: ${APOLLO_API_KEY:-placeholder}
    ports:
      - "8002:8002"
    volumes:
      - ./apps/leadup/backend:/app:cached
      - ./apps/leadup/frontend:/app/frontend:cached
      - /app/__pycache__
      - /app/frontend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; c = http.client.HTTPConnection('localhost:8002'); c.request('GET', '/health'); exit(0 if c.getresponse().status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cliender-network
    restart: unless-stopped

  # Adminer - Web UI for database management (optional, for debugging)
  adminer:
    image: adminer
    container_name: cliender-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - cliender-network
    restart: unless-stopped
    environment:
      ADMINER_PLUGINS: tables-filter tinymce

networks:
  cliender-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
